<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YIO Fish</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YIO Fish">
<style>
  :root {
    --gold: #bfa46f;
    --gold-dim: rgba(191,164,111,0.10);
    --bg: #000;
    --surface: #111;
    --border: #2a2a2a;
    --text: #fff;
    --text-muted: #555;
    --radius: 16px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: 92%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
  }
  .logo-wrap { width: 150px; margin: 0 auto 28px; }
  .logo-wrap img { width: 100%; height: auto; display: block; filter: brightness(1.1); }
  .gold-line { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 32px; opacity: .5; }
  .subtitle { font-size: 10px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 36px; }
  .location-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 22px 20px;
    margin-bottom: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition), transform var(--transition);
    -webkit-tap-highlight-color: transparent;
    gap: 6px;
  }
  .location-btn:active { background: var(--gold-dim); border-color: var(--gold); transform: scale(.97); }
  .loc-name { font-size: 15px; font-weight: 600; letter-spacing: 2.5px; color: var(--gold); }
  .loc-city { font-size: 11px; letter-spacing: 2px; color: var(--text-muted); }
  .footer { margin-top: 40px; font-size: 10px; color: #333; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <img src="logo.png" alt="YIO Fish">
  </div>
  <div class="gold-line"></div>
  <p class="subtitle">SELEZIONA IL RISTORANTE</p>

  <a class="location-btn" href="carpi.html">
    <span class="loc-name">YIO Fish Carpi</span>
  </a>

  <a class="location-btn" href="legnago.html">
    <span class="loc-name">YIO Fish Legnago</span>
  </a>

  <div class="footer">www.yiofish.it</div>
</div>
</body>
</html>
